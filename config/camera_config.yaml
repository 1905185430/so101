    product: icspring camera
    type: usb_cam
    role: wrist
    description: 腕部摄像头，固定于从臂末端附近，随臂运动，近距离观察夹爪与物体
    reference_image: reference_images/wrist_closeup.jpg
    visual_hints:
    - 夹爪主体占画面中央
    - 视野跟随机械臂运动
    - 可清晰看到夹爪开合动作和抓取细节
