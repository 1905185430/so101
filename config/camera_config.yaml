    - 能看到工作台面全景
    - 'Orbbec #1 相机本体在画面边缘'
    - 'Orbbec #2（侧面相机）可见一部分'
    dev: /dev/video18
  orbbec_2:
    serial: CP1L44P0007K
    by_id: /dev/v4l/by-id/usb-Orbbec_R__Orbbec_Gemini_335_CP1L44P0007K-video-index0
    by_path: /dev/v4l/by-path/pci-0000:00:14.0-usb-0:1:1.4-video-index0
    width: 640
    height: 480
    product: Orbbec Gemini 335
    type: orbbec
    role: side
    description: 侧面摄像头，安装高度与机械臂基座平齐，斜向下观察工作区域
    reference_image: reference_images/side_depth_view.jpg
    visual_hints:
    - 机械臂基座在画面一侧
    - 工作台侧面可见
    - 适合判断物体与夹爪的前后距离
    dev: /dev/video6
  icspring:
    serial: icSpring_icspring_camera_20240307110322
    by_id: /dev/v4l/by-id/usb-icSpring_icspring_camera_20240307110322-video-index0
