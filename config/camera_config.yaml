cameras:
  orbbec_1:
    serial: CP15641000AW
    by_id: /dev/v4l/by-id/usb-Orbbec_R__Orbbec_Gemini_335_CP15641000AW-video-index0
    by_path: /dev/v4l/by-path/pci-0000:00:14.0-usb-0:2.3:1.4-video-index0
    fourcc: YUYV
